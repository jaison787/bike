name: smart_bike_app
description: "Smart Bike IoT Safety System - Flutter Companion App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  web_socket_channel: ^3.0.3
  http: ^1.6.0
